button:active{

.show{

.chatArea{

.left{

.right{

.typingBubble{

@keyframes pulse{

  }

@keyframes fadeUp{
  from{
    transform:translateY(20px);
    opacity:0;
  }
  to{
    transform:translateY(0);
    opacity:1;
  }
}

.heart{
  position:fixed;
  font-size:18px;

@keyframes float{
  0%{
    transform:translateY(0);
    opacity:1;
  }

  100%{

    opacity:0;
  }

@keyframes floatEmoji{

    opacity:0;
  }

  10%{
    opacity:1;
  }

  to{
    transform:translateY(-120vh) rotate(360deg);
    opacity:0;
  }
}

let currentChat = 0;

function showChats(){

  if(currentChat >= chatMemories.length){

    setTimeout(()=>{

      document.getElementById("chatArea").innerHTML = "";

      currentChat = 0;

    },4000);

  }

  let area = document.getElementById("chatArea");

  let typing = document.createElement("div");

  typing.className = "typingBubble";

  typing.innerHTML = "typing...";

  area.appendChild(typing);

  setTimeout(()=>{

/* 🎵 MUSIC */

const allSongs =
["song1.mp3","song2.mp3","song3.mp3","song4.mp3","song5.mp3","song6.mp3","song7.mp3","song8.mp3"];

let lastSong = "";

function getSong(){

  let song;

  do{

    song =
    allSongs[Math.floor(Math.random()*allSongs.length)];

  }while(song === lastSong);

  lastSong = song;

  return song;
}

let isPlaying = false;
let started = false;

function playMusic(){

  let music = document.getElementById("bgMusic");

  let file = getSong();

  if(music.src.indexOf(file) === -1){

    music.src = file;
  }

  music.volume = 0.3;

  music.play();

  isPlaying = true;
}

function startMusicOnce(){

  if(!started){

    playMusic();

    started = true;
  }
}

function toggleMusic(){

  let music =
  document.getElementById("bgMusic");

  if(isPlaying){

    music.pause();

    document.getElementById("musicBtn").innerText = "🎵";

    isPlaying = false;

  }else{

    playMusic();

    document.getElementById("musicBtn").innerText = "⏸️";
  }
}

/* 💌 SHOW MESSAGE */

function showMessage(){

  let today = new Date();

  let target = new Date("May 27, 2026");

  let diff =
  Math.ceil((target - today)/(1000*60*60*24));

  let index = 26 - diff;

  if(index < 0) index = 0;

  if(index >= messages.length)
  index = messages.length - 1;

  let msg = document.getElementById("message");

  msg.innerText = messages[index];

  msg.classList.remove("show");

  setTimeout(()=> msg.classList.add("show"),100);

  playMusic();

  createHearts();
}

/* 💕 HEARTS */

function createHearts(){

  for(let i=0;i<6;i++){

    let heart = document.createElement("div");

    heart.className = "heart";

    heart.innerText =
    hearts[Math.floor(Math.random()*hearts.length)];

    heart.style.left =
    Math.random()*100 + "vw";

    heart.style.top = "100vh";

    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),6000);
  }
}

/* ✨ FLOATING EMOJIS */

const floatingEmojis =
["💗","💕","🌸","🥺","✨","💖","😌"];

function createFloatingEmoji(){

  let emoji = document.createElement("div");

  emoji.innerHTML =
  floatingEmojis[Math.floor(Math.random()*floatingEmojis.length)];

  emoji.style.position = "fixed";

  emoji.style.left = Math.random()*100 + "vw";

  emoji.style.top = "100vh";

  emoji.style.fontSize =
  (18 + Math.random()*15) + "px";

  emoji.style.opacity = "0.8";

  emoji.style.zIndex = "999";

  emoji.style.pointerEvents = "none";

  emoji.style.animation =
  "floatEmoji 8s linear forwards";

  document.body.appendChild(emoji);

  setTimeout(()=>emoji.remove(),8000);
}

/* ⏳ COUNTDOWN */

let targetDate =
new Date("May 27, 2026 00:00:00").getTime();

setInterval(()=>{

  let now = new Date().getTime();

  let gap = targetDate - now;

  if(gap <= 0){

    document.getElementById("countdown").innerHTML =
    "It’s your day Bettuuu 🎂❤️";

    return;
  }

  let d =
  Math.floor(gap/(1000*60*60*24));

  let h =
  Math.floor((gap%(1000*60*60*24))/(1000*60*60));

  let m =
  Math.floor((gap%(1000*60*60))/(1000*60));

  let s =
  Math.floor((gap%(1000*60))/1000);

  document.getElementById("countdown").innerHTML =
  `💖 ${d} days <br>
   💕 ${h} hrs <br>
   💗 ${m} min <br>
   ❤️ ${s} sec`;

},1000);
