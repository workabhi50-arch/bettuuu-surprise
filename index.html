<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Pyaalaa Bettuuu ❤️</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  text-align:center;
  color:white;
  padding:20px;
  overflow:hidden;

  /* 🌆 Romantic Delhi Night Gradient */
  background: linear-gradient(135deg, #2c003e, #ff4e88, #1a001f);
}

/* ✨ Glow Title */
h1 {
  font-size: 26px;
  text-shadow: 0 0 10px pink, 0 0 20px red;
}

/* 💎 Glass Card */
.box {
  margin-top:30px;
  padding:25px;
  border-radius:20px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(12px);
  box-shadow: 0 0 25px rgba(255, 0, 100, 0.4);
}

/* 💌 Button */
button {
  padding:14px 22px;
  border:none;
  border-radius:20px;
  background: linear-gradient(45deg, #ff4e88, #ff004c);
  color:white;
  font-size:16px;
  margin-top:15px;
  box-shadow: 0 0 15px pink;
}

/* 💬 Message */
#message {
  margin-top:20px;
  font-size:18px;
  line-height:1.6;
  opacity:0;
  transition: opacity 1.5s ease;
}
.show {
  opacity:1 !important;
}

/* 🎵 Music Button */
#musicBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: linear-gradient(45deg, pink, red);
  border-radius: 50%;
  padding: 12px;
  font-size: 18px;
}

/* 💕 Floating Hearts */
.heart {
  position: fixed;
  font-size: 18px;
  animation: float 6s linear infinite;
}
@keyframes float {
  0% {transform: translateY(0); opacity:1;}
  100% {transform: translateY(-900px); opacity:0;}
}

/* ⏳ Countdown Style */
#countdown {
  font-size: 24px;
  line-height: 1.6;
  text-shadow: 0 0 10px pink;
}
</style>
</head>

<body onclick="startMusicOnce()">

<h1 id="title">Hey Bettuuu ❤️</h1>
<p>Yupp… just for you 💕</p>

<audio id="bgMusic" loop></audio>

<div class="box">
  <h2 id="countdown"></h2>
  <button onclick="showMessage()">Open Today 💌</button>
  <p id="message"></p>
</div>

<button onclick="toggleMusic()" id="musicBtn">🎵</button>

<script>

// ❤️ Title animation
const hearts = ["❤️","💗","💖","💕"];
setInterval(()=>{
  let h = hearts[Math.floor(Math.random()*hearts.length)];
  document.getElementById("title").innerText = "Hey Bettuuu " + h;
},2000);

// 💌 Messages
const messages = [

`Jab Tum chhoti chhoti baatein… jis tarah sab notice karti ho…  
Monkey ko woh sab secretly bahut pasand hai mella chotu sa bachaaaa 🐒💖`,

`Tum ‘yupp’ bolti ho na… pata nahi kyun…  
par woh mere liye duniya ka sabse cute sound hai 😄💕`,

`Agar feelings ka koi forest hota na…  
toh tum meri sabse peaceful jagah hoti 🌿💗  
jahaan m bina kuch bole bas reh sakta…  
jahaan har cheez slow aur soft feel hoti hai…  
aur jahaan sirf tum ho… aur ek pyaar bhara sukoon wali feeling ❤️`,

`Tumhe shayad pata bhi nahi…  
par tum meri daily happiness ka sabse bada reason ho ❤️🥺  
mtlb chahe din kitna bhi normal ya thoda heavy kyu na ho…  
tumhari ek chhoti si baat ya bas tumhari presence hi  
sab kuch better bana deti hai…  
aur sach bolu, ab aadat si ho gayi hai tumse khush rehne ki 💕`,

`Kabhi kabhi bas tumhari chat kholke…  
khud hi smile aa jati hai… bina reason ke 💕`,

`Tum sensitive ho… aur wahi tumhe itna special banata hai…  
tum alag ho… aur mujhe wahi pasand hai 💖`,

`Monkey ka favourite place? 👉 Tumhari baaton mein…  
waha sab kuch thoda better lagta hai 😌💕`,

`Tumhare ‘nope’ mein bhi attitude kam aur cuteness zyada hoti hai 😏💗  
aur main har baar haar jaata hoon usme`,

`Main tumhe impress nahi karna chahta…  
main bas tumhe genuinely khush dekhna chahta hoon ❤️✨`,

`Tumhari care subtle hoti hai…  
par feel itni deep hoti hai ki explain bhi nahi kar paata 💕`,

`Tum meri aadat ban rahi ho…  
aur sach kahu toh mujhe ye aadat chhodni bhi nahi hai 😌💖`,

`Agar rewind milta na…  
toh main tumse aur jaldi milta… shayad aur zyada time milta tumhare saath ❤️`,

`Tum sirf meri Bettuuu nahi ho…  
tum meri peace ho 🌿💗`,

`Kabhi kabhi lagta hai…  
tum real ho ya kisi soft dream ka part ho 💭💕`,

`Tumhari simplicity hi tumhari sabse badi beauty hai…  
aur wahi tumhe perfect banata hai 💖`,

`Monkey approved fact: Bettuuu = best decision 🐒💗  
aur ye decision kabhi change nahi hoga 😌`,

`Excitement ab double ho raha hai…  
kyunki tumhara special day paas aa raha hai 😄❤️`,

`Tumhare bina sab normal lagta hai…  
par tumhare saath sab special ho jaata hai 💕`,

`Tum meri story ka best chapter ho…  
aur honestly, main chahta hoon ye kabhi end na ho 📖💗`,

`Bas 1 week… aur main officially us din ko celebrate karunga  
jahan meri duniya better hui 😌❤️`,

`Tumhari vibe bilkul green forest jaisi hai…  
calm, soft aur addictive 🌲💖`,

`Monkey already smile kar raha hai bina reason ke…  
shayad reason tum ho 😄💗`,

`Tum ho toh sab simple lagta hai…  
warna life thodi complicated thi ❤️`,

`Bas thoda sa aur…  
phir tumhe extra pamper milne wala hai 😏💕`,

`Ready rehna Bettuuu…  
kyunki tumhara day special hone wala hai 💗✨`,

`Kal tumhara birthday nahi…  
meri life ka best day anniversary hai ❤️🥺  
Thank you for existing… seriously 💖`
];
// 🎵 Shuffle Songs
const allSongs = ["song1.mp3","song2.mp3","song3.mp3","song4.mp3"];
let lastSong = "";

function getSong(){
  let song;
  do {
    song = allSongs[Math.floor(Math.random()*allSongs.length)];
  } while(song === lastSong);
  lastSong = song;
  return song;
}

let isPlaying = false;
let started = false;

function playMusic(){
  let music = document.getElementById("bgMusic");
  let file = getSong();

  if(music.src.indexOf(file) === -1){
    music.src = file;
  }

  music.volume = 0.3;
  music.play();
  isPlaying = true;
}

function startMusicOnce(){
  if(!started){
    playMusic();
    started = true;
  }
}

function toggleMusic(){
  let music = document.getElementById("bgMusic");

  if(isPlaying){
    music.pause();
    document.getElementById("musicBtn").innerText = "🎵";
    isPlaying = false;
  } else {
    playMusic();
    document.getElementById("musicBtn").innerText = "⏸️";
  }
}

// 💌 Show Message
function showMessage(){

  let today = new Date();
  let target = new Date("May 27, 2026");

  let diff = Math.ceil((target - today)/(1000*60*60*24));

  let index = 27 - diff;

  if(index < 0) index = 0;
  if(index >= messages.length) index = messages.length - 1;

  let msg = document.getElementById("message");

  msg.innerText = messages[index];
  msg.classList.remove("show");

  setTimeout(()=> msg.classList.add("show"), 100);

  playMusic();
  createHearts();
}

// 💕 Hearts
function createHearts(){
  for(let i=0;i<6;i++){
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerText = hearts[Math.floor(Math.random()*hearts.length)];
    heart.style.left = Math.random()*100 + "vw";
    heart.style.top = "100vh";
    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),6000);
  }
}

// ⏳ Real-time Countdown
let targetDate = new Date("May 27, 2026 00:00:00").getTime();

setInterval(()=>{
  let now = new Date().getTime();
  let gap = targetDate - now;

  if(gap <= 0){
    document.getElementById("countdown").innerHTML = "It’s your day Bettuuu 🎂❤️";
    return;
  }

  let d = Math.floor(gap/(1000*60*60*24));
  let h = Math.floor((gap%(1000*60*60*24))/(1000*60*60));
  let m = Math.floor((gap%(1000*60*60))/(1000*60));
  let s = Math.floor((gap%(1000*60))/1000);

  document.getElementById("countdown").innerHTML =
  `💖 ${d} days <br> 💕 ${h} hrs <br> 💗 ${m} min <br> ❤️ ${s} sec`;
},1000);

</script>

</body>
</html>
